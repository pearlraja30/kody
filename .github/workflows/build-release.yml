# =============================================================================
# Kodys Application - CI/CD Build Pipeline
# =============================================================================
# Builds the Kodys Medical application for multiple platforms:
#   - Docker Image for server/web/mobile/tablet deployment
#   - Windows Portable ZIP Package
#   - Mac Application (.app)
#
# Note: Windows Installer (.exe via Inno Setup) requires the bundled py-dist/
#       folder which is not in git. Build it locally with Inno Setup instead.
#
# Triggers: Push to main/release branches, manual dispatch, tags
# =============================================================================

name: Kodys Build & Release Pipeline

on:
  push:
    branches: [main, release/*]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_docker:
        description: 'Build Docker image'
        type: boolean
        default: true
      build_mac:
        description: 'Build Mac package'
        type: boolean
        default: true
      version:
        description: 'Version tag (e.g. 2.1.0)'
        type: string
        default: '2.0.0'

env:
  APP_NAME: "Kodys Foot Clinik"
  APP_VERSION: ${{ github.event.inputs.version || '2.0.0' }}

# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ===========================================================================
  # JOB 0: Windows Installer (.exe) via Inno Setup
  # ===========================================================================
  build-windows-installer:
    name: 🪟 Windows Installer (.exe)
    runs-on: windows-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Install Python 2.7 (32-bit) via Choco
        shell: powershell
        run: |
          # Install 32-bit Python 2.7 via Choco (guaranteed x86)
          choco install python2 --x86 --forcex86 -y
          
          $pyExe = "C:\Python27\python.exe"
          if (!(Test-Path $pyExe)) {
             Write-Host "ERROR: Python not found at $pyExe"
             exit 1
          }

          # Verify Bitness (MUST be 4 for 32-bit)
          $bitness = & "$pyExe" -c "import struct; print(struct.calcsize('P'))"
          Write-Host "Python Bitness Check: $bitness bytes"
          if ($bitness -ne 4) {
             Write-Host "❌ FATAL ERROR: Expected 32-bit Python (4 bytes) but got $bitness. Stopping build."
             exit 1
          }

          # Setup the py-dist structure but PRESERVE the files already in git
          $targetDir = "${{ github.workspace }}\py-dist\python-2.7.10"
          if (!(Test-Path $targetDir)) { New-Item -ItemType Directory -Force -Path $targetDir | Out-Null }
          
          # Copy everything from C:\Python27 to target
          Copy-Item -Path "C:\Python27\*" -Destination $targetDir -Recurse -Force
          
          # Robust DLL Discovery: The system sometimes hides python27.dll in SysWOW64
          $dllPaths = @(
              "C:\Python27\python27.dll",
              "C:\Windows\SysWOW64\python27.dll",
              "C:\Windows\System32\python27.dll"
          )
          
          $dllFound = $false
          foreach ($path in $dllPaths) {
              if (Test-Path $path) {
                  Write-Host "Found python27.dll at: $path"
                  Copy-Item -Path $path -Destination "$targetDir\python27.dll" -Force
                  $dllFound = $true
                  break
              }
          }

          if (!$dllFound) {
              Write-Host "⚠️ WARNING: python27.dll not found in standard paths. Searching C:\..."
              $searchResult = Get-ChildItem -Path "C:\" -Filter "python27.dll" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($searchResult) {
                  Write-Host "Found via search at: $($searchResult.FullName)"
                  Copy-Item -Path $searchResult.FullName -Destination "$targetDir\python27.dll" -Force
              } else {
                  Write-Host "❌ FATAL ERROR: python27.dll NOT FOUND. Build will likely fail at runtime."
                  exit 1
              }
          }

          # Final Listing for verification
          Write-Host "--- Content of py-dist\python-2.7.10 ---"
          dir "$targetDir"
          
          # Verify
          & "$targetDir\python.exe" --version
          Write-Host "✅ Verified 32-bit Python 2.7 environment in py-dist\python-2.7.10\"

      - name: 📦 Setup py-dist environment
        shell: powershell
        run: |
          $pyDir = "${{ github.workspace }}\py-dist\python-2.7.10"
          $scriptsDir = "${{ github.workspace }}\py-dist\scripts"

          # Add Python 2.7 to PATH FIRST
          echo "$pyDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "$pyDir\Scripts" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          # Verify
          & "$pyDir\python.exe" --version

      - name: 📦 Install pip and GUI dependencies
        shell: cmd
        run: |
          set "PATH=${{ github.workspace }}\py-dist\python-2.7.10;${{ github.workspace }}\py-dist\python-2.7.10\Scripts;%PATH%"

          REM Install pip
          powershell -Command "Invoke-WebRequest -Uri 'https://bootstrap.pypa.io/pip/2.7/get-pip.py' -OutFile 'get-pip.py'"
          python get-pip.py "pip<21.0" "setuptools<45"

          REM Install CEF Python 3 (this downloads the heavy libcef.dll)
          echo === Installing CEF Python ===
          pip install cefpython3==31.2
          
          REM Verify PyQt4 exists (it should be there from git)
          if not exist "py-dist\python-2.7.10\Lib\site-packages\PyQt4" (
             echo ERROR: PyQt4 was not found in the repository!
             exit /b 1
          )

      - name: 📦 Install project dependencies
        shell: cmd
        run: |
          set "PATH=${{ github.workspace }}\py-dist\python-2.7.10;${{ github.workspace }}\py-dist\python-2.7.10\Scripts;%PATH%"

          REM Verify we're using Python 2.7, NOT 3.x
          python --version 2>&1 | findstr "2.7" || (echo ERROR: Wrong Python version! & exit /b 1)

          REM Install pip for Python 2.7
          echo Downloading get-pip.py for Python 2.7...
          powershell -Command "Invoke-WebRequest -Uri 'https://bootstrap.pypa.io/pip/2.7/get-pip.py' -OutFile 'get-pip.py'"
          python get-pip.py "pip<21.0" "setuptools<45"

          REM Stage 1: Core libraries (no build dependencies)
          echo === Stage 1: Core libraries ===
          pip install --only-binary=:all: numpy==1.16.6
          pip install --only-binary=:all: scipy==1.2.3
          pip install six==1.15.0 pytz==2020.1 python-dateutil==2.8.1

          REM Stage 2: Packages that depend on Stage 1
          echo === Stage 2: Framework and data libraries ===
          pip install Django==1.11.29
          pip install --only-binary=:all: pandas==0.24.2
          pip install --only-binary=:all: matplotlib==2.2.5
          pip install biosppy==0.6.1

          REM Stage 3: Packages that need biosppy installed first
          echo === Stage 3: ECG analysis packages ===
          pip install heartpy==1.2.7
          pip install pyhrv==0.4.1

          REM Stage 4: Remaining packages
          echo === Stage 4: Remaining packages ===
          pip install jsonfield==2.0.2
          pip install xlrd==1.2.0
          pip install --only-binary=:all: opencv-python==4.2.0.32
          pip install Pillow==6.2.2
          pip install pdf2image==1.11.0
          pip install cryptography==2.9.2
          pip install shortuuid==0.5.0
          pip install spectrum==0.7.5
          pip install --only-binary=:all: scikit-learn==0.20.4
          pip install nolds==0.5.2

          echo ✅ All dependencies installed!

      - name: 🧪 Smoke test & Verification
        shell: powershell
        run: |
          $env:PATH = "${{ github.workspace }}\py-dist\python-2.7.10;${{ github.workspace }}\py-dist\python-2.7.10\Scripts;$env:PATH"
          
          # --- ENSURE sip REDUNDANCY for v2.0.7 ---
          $sp = "${{ github.workspace }}\py-dist\python-2.7.10\Lib\site-packages"
          if (Test-Path "$sp\sip.pyd") {
              Write-Host "Copying sip.pyd to PyQt4 for redundancy..."
              Copy-Item "$sp\sip.pyd" "$sp\PyQt4\sip.pyd" -Force
          }

          Write-Host "--- Testing Dependencies Diagnostic ---"
          & python -c "import sys; print('sys.path:'); print(sys.path); import os; print('CWD: ' + os.getcwd())"
          & python -c "import serial; print('serial OK')"
          & python -c "from PyQt4 import QtGui; print('PyQt4.QtGui OK')"
          & python -c "import numpy; print('numpy OK')"
          & python -c "import scipy; print('scipy OK')"
          & python -c "import matplotlib; print('matplotlib OK')"
          & python -c "from cefpython3 import cefpython; print('cefpython3 OK')"
          
          if ($LASTEXITCODE -ne 0) {
              Write-Host "--- site-packages Folder Contents ---"
              dir "${{ github.workspace }}\py-dist\python-2.7.10\Lib\site-packages"
              Write-Host "❌ FATAL ERROR: Critical dependencies failed to import in CI environment!"
              exit 1
          }

          Set-Location app\appsource\app_config
          & python -c "import django; print('Django ' + django.get_version() + ' OK')"

      - name: 🔧 Install Inno Setup
        shell: powershell
        run: |
          $url = "https://jrsoftware.org/download.php/is.exe"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\innosetup.exe"
          Start-Process "$env:TEMP\innosetup.exe" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /SP-" -Wait
          echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "Inno Setup installed!"

      - name: 🏗️ Build Windows Installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer_config.iss
          echo Installer built!
          dir dist\

      - name: 📤 Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ env.APP_VERSION }}
          path: dist/*.exe
          retention-days: 30

  # ===========================================================================
  # JOB 1: Docker Image (Server, Tablet, Phone - Web Access)
  # ===========================================================================
  build-docker:
    name: 🐳 Docker Image (Web/Mobile/Tablet)
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_docker != 'false' }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗️ Build Docker image
        run: |
          docker build -t kodys-app:${{ env.APP_VERSION }} .
          docker tag kodys-app:${{ env.APP_VERSION }} kodys-app:latest
          echo "✅ Docker image built successfully!"
          docker images kodys-app

      - name: 🧪 Test Docker image
        run: |
          docker run -d --name kodys-test-container -p 5423:5423 kodys-app:${{ env.APP_VERSION }}
          sleep 15
          # Health check
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5423/ || echo "000")
          echo "HTTP Response: $HTTP_CODE"
          docker logs kodys-test-container --tail 20
          docker stop kodys-test-container
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ]; then
            echo "✅ Health check passed!"
          else
            echo "⚠️ Server started but returned $HTTP_CODE (may need login redirect)"
          fi

      - name: 📤 Export Docker image as tar.gz
        run: |
          docker save kodys-app:${{ env.APP_VERSION }} | gzip > kodys-docker-image-${{ env.APP_VERSION }}.tar.gz
          ls -lh kodys-docker-image-*.tar.gz

      - name: 📤 Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ env.APP_VERSION }}
          path: kodys-docker-image-*.tar.gz
          retention-days: 30

  # ===========================================================================
  # JOB 2: Windows Portable Package (Docker-based)
  # ===========================================================================
  build-windows-portable:
    name: 📦 Windows Portable Package
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Create portable Docker package
        run: |
          mkdir -p portable-package

          # Create a Windows-friendly launch script
          cat > portable-package/start-kodys.bat << 'BAT'
          @echo off
          echo ========================================
          echo   Kodys Medical Application
          echo   Starting Docker container...
          echo ========================================
          echo.
          docker-compose up -d
          timeout /t 5 /nobreak > nul
          echo.
          echo Application is running!
          echo Open your browser to: http://localhost:5423
          echo.
          echo Login: admin / admin123
          echo.
          echo To stop: docker-compose down
          start http://localhost:5423
          pause
          BAT

          # Create a Mac/Linux launch script
          cat > portable-package/start-kodys.sh << 'SH'
          #!/bin/bash
          echo "========================================"
          echo "  Kodys Medical Application"
          echo "  Starting Docker container..."
          echo "========================================"
          docker-compose up -d
          sleep 5
          echo ""
          echo "Application is running!"
          echo "Open your browser to: http://localhost:5423"
          echo "Login: admin / admin123"
          echo ""
          echo "To stop: docker-compose down"
          open http://localhost:5423 2>/dev/null || xdg-open http://localhost:5423 2>/dev/null
          SH
          chmod +x portable-package/start-kodys.sh

          # Copy essential files
          cp Dockerfile portable-package/
          cp docker-compose.yml portable-package/
          cp -r app portable-package/
          cp -r config portable-package/ 2>/dev/null || true
          cp TESTING_GUIDE.md portable-package/ 2>/dev/null || true
          cp README.md portable-package/ 2>/dev/null || true

          # Create README
          cat > portable-package/README.txt << 'README'
          Kodys Medical Application - Portable Package
          ==============================================

          Prerequisites:
            - Docker Desktop installed (https://www.docker.com/products/docker-desktop)

          To Start:
            Windows: Double-click start-kodys.bat
            Mac/Linux: Run ./start-kodys.sh

          To Stop:
            Run: docker-compose down

          Access:
            URL: http://localhost:5423
            Username: admin
            Password: admin123

          For tablet/phone access:
            Connect to the same network and open http://YOUR_PC_IP:5423
          README

          # Create ZIP
          cd portable-package
          zip -r ../Kodys_Portable_${{ env.APP_VERSION }}.zip .
          cd ..
          ls -lh Kodys_Portable_*.zip

      - name: 📤 Upload Portable Package
        uses: actions/upload-artifact@v4
        with:
          name: portable-package-${{ env.APP_VERSION }}
          path: Kodys_Portable_*.zip
          retention-days: 30

  # ===========================================================================
  # JOB 3: Mac Application Package
  # ===========================================================================
  build-mac-app:
    name: 🍎 Mac Application
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_mac != 'false' }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗️ Create Mac Application Bundle
        run: |
          APP_DIR="dist/Kodys Foot Clinik.app"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"

          # Create Info.plist
          cat > "$APP_DIR/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>launch</string>
              <key>CFBundleIdentifier</key>
              <string>com.kodys.footclinik</string>
              <key>CFBundleName</key>
              <string>Kodys Foot Clinik</string>
              <key>CFBundleVersion</key>
              <string>${{ env.APP_VERSION }}</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ env.APP_VERSION }}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleIconFile</key>
              <string>appicon</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.14</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          PLIST

          # Create launch script (Docker-based)
          cat > "$APP_DIR/Contents/MacOS/launch" << 'LAUNCH'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")/../Resources" && pwd)"
          cd "$DIR"

          # Check if Docker is running
          if ! docker info > /dev/null 2>&1; then
              osascript -e 'display alert "Docker Required" message "Please install and start Docker Desktop first.\n\nDownload: https://www.docker.com/products/docker-desktop" as critical'
              open "https://www.docker.com/products/docker-desktop"
              exit 1
          fi

          # Start the app via Docker
          docker-compose up -d 2>/dev/null || docker compose up -d
          sleep 5
          open "http://localhost:5423"

          # Keep running
          osascript -e 'display dialog "Kodys is running at http://localhost:5423\n\nClick OK to stop the server." buttons {"OK"} default button "OK"'
          docker-compose down 2>/dev/null || docker compose down
          LAUNCH
          chmod +x "$APP_DIR/Contents/MacOS/launch"

          # Copy application files to Resources
          cp Dockerfile "$APP_DIR/Contents/Resources/"
          cp docker-compose.yml "$APP_DIR/Contents/Resources/"
          cp -R app "$APP_DIR/Contents/Resources/"
          cp -R config "$APP_DIR/Contents/Resources/" 2>/dev/null || true
          cp appicon.ico "$APP_DIR/Contents/Resources/" 2>/dev/null || true

          echo "✅ Mac .app bundle created!"
          ls -la dist/

      - name: 📦 Create Mac ZIP
        run: |
          cd dist
          zip -r "../Kodys_Foot_Clinik_Mac_${{ env.APP_VERSION }}.zip" "Kodys Foot Clinik.app"
          cd ..
          ls -lh Kodys_Foot_Clinik_Mac_*.zip

      - name: 📤 Upload Mac Application
        uses: actions/upload-artifact@v4
        with:
          name: mac-app-${{ env.APP_VERSION }}
          path: Kodys_Foot_Clinik_Mac_*.zip
          retention-days: 30

  # ===========================================================================
  # JOB 4: Create GitHub Release (on tag push)
  # ===========================================================================
  create-release:
    name: 🚀 Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows-installer, build-docker, build-windows-portable, build-mac-app]
    permissions:
      contents: write

    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: 📋 List artifacts
        run: find release-artifacts -type f

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ env.APP_NAME }} ${{ github.ref_name }}"
          body: |
            ## ${{ env.APP_NAME }} ${{ github.ref_name }}

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | **🪟 Windows** | `Kodys.Foot.Clinik.Installer.exe` | **Standalone Installer** (No Docker required) |
            | 🐳 Docker | `kodys-docker-image-*.tar.gz` | Server/cloud distribution |
            | 📦 Portable | `Kodys_Portable_*.zip` | Cross-platform, requires Docker Desktop |
            | 🍎 Mac | `Kodys_Foot_Clinik_Mac_*.zip` | macOS app bundle, requires Docker |

            ### Quick Start (Docker)
            ```bash
            docker load < kodys-docker-image-${{ env.APP_VERSION }}.tar.gz
            docker run -d -p 5423:5423 kodys-app
            # Open: http://localhost:5423
            # Login: admin / admin123
            ```

            ### Access from Phone/Tablet
            Connect to the same network and open `http://YOUR_PC_IP:5423` in any browser.
          files: |
            release-artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
