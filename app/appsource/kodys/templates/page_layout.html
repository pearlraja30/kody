<style>
	html, body {
		margin: 0 !important;
		padding: 0 !important;
		width: 100% !important;
		height: 100% !important;
		overflow: auto !important;
	}
	.w100 { width: 100% !important; }
	.h100 { height: 100% !important; }
	.loading-overlay {
		position: fixed;
		top: 0;
		left: 0;
		width: 100%;
		height: 100%;
		background: rgba(255, 255, 255, 0.7);
		display: none;
		justify-content: center;
		align-items: center;
		z-index: 10000;
	}
	.spinner {
		width: 50px;
		height: 50px;
		border: 5px solid #f3f3f3;
		border-top: 5px solid #00BDB6;
		border-radius: 50%;
		animation: spin 1s linear infinite;
	}
	@keyframes spin {
		0% { transform: rotate(0deg); }
		100% { transform: rotate(360deg); }
	}
</style>
<body ondragstart="return false" ondrop="return false;">
	<div id="loading-overlay" class="loading-overlay">
		<div class="spinner"></div>
	</div>
	<div class="w100 h100 bgclr3" style="min-height: 100vh; display: flex; flex-direction: column;">
	<div class="sticky-header">
		{% block header %}{% include 'includes/header.html' %}{% endblock %}
	</div>
	<div style="flex: 1; position: relative;">
		{% block content_body %}{% endblock %}
	</div>
	{% block js_script %}{% endblock %}
	</div>
	<script>
		$(document).ready(function() {
			$('a').not('[href="#"]').not('.no-loader').on('click', function() {
				if ($(this).attr('target') !== '_blank') {
					$('#loading-overlay').css('display', 'flex');
				}
			});
			$('form').on('submit', function() {
				$('#loading-overlay').css('display', 'flex');
			});
		});
		// Hide loader on back/forward
		window.onpageshow = function(event) {
			if (event.persisted) {
				$('#loading-overlay').hide();
			}
		};
	</script>
</body>
